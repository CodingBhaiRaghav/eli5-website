
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELI5 - Explain Like I'm 5</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --black: #111110; --dark: #1C1C1A; --mid: #2E2E2B; --white: #F0EDE6; --accent: #F2C46D; --border: #3a3a37; }
        body { background: var(--dark); color: var(--white); font-family: 'Space Grotesk', sans-serif; padding: 2rem; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; text-align: center; }
        h1 { font-family: 'Syne', sans-serif; margin-bottom: 2rem; }
        .search-box { display: flex; gap: 10px; margin-bottom: 2rem; }
        input { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--black); color: white; outline: none; }
        button { background: var(--accent); border: none; padding: 0 25px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .card { background: var(--mid); padding: 2rem; border-radius: 20px; display: none; text-align: left; border: 1px solid var(--border); }
        #loading { display: none; margin-top: 1rem; color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Explain Like I'm 5</h1>
        <form class="search-box" id="askForm">
            <input type="text" id="topicInput" placeholder="Ask me anything..." required>
            <button type="submit">Go!</button>
        </form>
        <div id="loading">✨ Creating a simple answer...</div>
        <div id="result-card" class="card">
            <h2 id="resTitle" style="margin-bottom:10px; color:var(--accent)"></h2>
            <p id="resText"></p>
        </div>
    </div>

    <script>
        const form = document.getElementById('askForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const topic = document.getElementById('topicInput').value;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result-card').style.display = 'none';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic })
                });
                const data = await response.json();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('resTitle').innerText = topic;
                document.getElementById('resText').innerText = data.reply;
                document.getElementById('result-card').style.display = 'block';
            } catch (err) {
                alert("Something went wrong!");
                document.getElementById('loading').style.display = 'none';
            }
        });
    </script>
</body>
</html>
